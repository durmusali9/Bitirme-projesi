<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial;
            margin: 24px
        }
        
        .card {
            max-width: 520px;
            margin: 24px auto;
            padding: 18px;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06)
        }
        
        label {
            display: block;
            margin-bottom: 8px
        }
        
        input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc
        }
        
        button {
            margin-top: 12px;
            padding: 8px 12px
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Admin Girişi</h2>
        <p>Devam etmek için admin anahtarınızı girin.</p>
        <label>Admin Key
      <input id="secret" type="text" autocomplete="off" />
    </label>
        <button id="loginBtn">Giriş</button>
        <div id="msg" style="margin-top:12px;color:#b00"></div>
    </div>

    <script>
        const btn = document.getElementById('loginBtn');
        const secretInput = document.getElementById('secret');
        const msg = document.getElementById('msg');
        btn.addEventListener('click', async() => {
            msg.textContent = '';
            const secret = secretInput.value.trim();
            if (!secret) return msg.textContent = 'Anahtar gerekli';
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        secret
                    })
                });
                const j = await res.json();
                if (!res.ok) {
                    msg.textContent = (j && j.error && (j.error.tr || j.error.en)) || 'Giriş başarısız';
                    return;
                }
                // success -> redirect to /admin
                window.location.href = '/admin';
            } catch (e) {
                msg.textContent = e.message || 'Hata';
            }
        });
    </script>
</body>

</html>
