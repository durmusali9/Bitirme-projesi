<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LangTalk — Admin Panel</title>
    <style>
        body {
            font-family: system-ui, Segoe UI, Roboto, Arial;
            margin: 16px;
            background: #f7f8fb
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto
        }
        
        h1 {
            font-size: 20px
        }
        
        .row {
            display: flex;
            gap: 16px;
            align-items: flex-start
        }
        
        .card {
            background: #fff;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(6, 15, 35, 0.06);
            flex: 1
        }
        
        table {
            width: 100%;
            border-collapse: collapse
        }
        
        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #f1f3f6;
            text-align: left
        }
        
        th {
            font-weight: 600;
            color: #233
        }
        
        button {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #d0d6dd;
            background: #fff;
            cursor: pointer
        }
        
        .danger {
            background: #fff0f0;
            border-color: #f5c6c6
        }
        
        input[type=text],
        input[type=number],
        input[type=datetime-local] {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #d0d6dd
        }
        
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px
        }
        
        .muted {
            color: #6b7280;
            font-size: 13px
        }
        
        .small {
            font-size: 13px;
            padding: 6px 8px
        }
        
        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 8px
        }
        
        .user-actions button {
            margin-right: 8px
        }
        
        .temp-password-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
            font-size: 12px
        }
        
        .temp-password-box code {
            background: #ffe9a8;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 600;
            word-break: break-all
        }
        
        .temp-password-box .copy-btn {
            padding: 6px 10px;
            margin-left: 8px;
            border-radius: 6px;
            border: 1px solid #ffc107;
            background: #fff;
            cursor: pointer
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Kontrol Paneli</h1>
        <p>Basit admin panel. Geliştirme için `ADMIN_SECRET` kullanın veya NODE_ENV=development'da boş bırakın.</p>

        <div class="controls">
            <label>Admin Key: <input id="adminKey" type="text" placeholder="admin secret" /></label>
            <button id="refreshBtn">Yenile</button>
            <button id="clearBtn">Logout Key</button>
        </div>

        <div class="row">
            <div class="card">
                <h2>Users</h2>
                <div id="usersContainer">Loading...</div>
            </div>
            <div class="card">
                <h2>Rooms</h2>
                <div id="roomsContainer">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = (window.location.origin || 'http://localhost:4000').replace(/\/$/, '') + '/api';
        const adminKeyInput = document.getElementById('adminKey');
        const refreshBtn = document.getElementById('refreshBtn');
        const clearBtn = document.getElementById('clearBtn');

        function getAdminHeader() {
            const key = adminKeyInput.value || '';
            return key ? {
                'x-admin-secret': key,
                'Content-Type': 'application/json'
            } : {
                'Content-Type': 'application/json'
            };
        }

        async function fetchUsers() {
            const container = document.getElementById('usersContainer');
            container.textContent = 'Loading...';
            try {
                const res = await fetch(API_BASE + '/admin/users', {
                    headers: getAdminHeader()
                });
                const json = await res.json();
                if (!res.ok) {
                    container.textContent = 'Error: ' + JSON.stringify(json);
                    return;
                }
                const users = json.data.users || [];
                if (!users.length) {
                    container.textContent = 'No users';
                    return;
                }
                const table = document.createElement('table');
                const thead = document.createElement('thead');
                thead.innerHTML = '<tr><th>#</th><th>Name</th><th>Email</th><th>Last Login</th><th>Usage</th><th>Actions</th></tr>';
                table.appendChild(thead);
                const tbody = document.createElement('tbody');
                users.forEach((u, i) => {
                    const tr = document.createElement('tr');
                    const lastLogin = u.lastLogin ? new Date(u.lastLogin).toLocaleString() : '<span class="muted">never</span>';
                    const usage = u.usageSeconds ? Math.floor(u.usageSeconds / 60) + 'm ' + (u.usageSeconds % 60) + 's' : '<span class="muted">0s</span>';
                    tr.innerHTML = `<td>${i+1}</td><td>${u.name||''}<div class="muted small">@${u.username||''}</div></td><td>${u.email||''}</td><td>${lastLogin}</td><td>${usage}</td><td></td>`;

                    const actionsTd = tr.querySelector('td:last-child');
                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'Delete';
                    delBtn.className = 'danger small';
                    delBtn.addEventListener('click', async() => {
                        if (!confirm('Delete user?')) return;
                        await fetch(API_BASE + '/admin/users/' + u._id, {
                            method: 'DELETE',
                            headers: getAdminHeader()
                        });
                        fetchUsers();
                    });

                    const resetBtn = document.createElement('button');
                    resetBtn.textContent = 'Reset Password';
                    resetBtn.className = 'small';
                    resetBtn.addEventListener('click', async() => {
                        const pw = prompt('Enter new password for ' + (u.email || u.name));
                        if (!pw) return;
                        const res = await fetch(API_BASE + '/admin/users/' + u._id + '/reset-password', {
                            method: 'POST',
                            headers: getAdminHeader(),
                            body: JSON.stringify({
                                password: pw
                            })
                        });
                        if (!res.ok) alert('Failed to reset password');
                        else alert('Password updated');
                    });

                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit Usage';
                    editBtn.className = 'small';
                    editBtn.addEventListener('click', async() => {
                        const current = u.usageSeconds || 0;
                        const val = prompt('Set usage seconds for ' + (u.email || u.name) + ' (current: ' + current + ')', String(current));
                        if (val === null) return;
                        const num = parseInt(val, 10);
                        if (isNaN(num)) return alert('Invalid number');
                        const res = await fetch(API_BASE + '/admin/users/' + u._id, {
                            method: 'PATCH',
                            headers: getAdminHeader(),
                            body: JSON.stringify({
                                usageSeconds: num
                            })
                        });
                        if (!res.ok) alert('Failed to update');
                        else fetchUsers();
                    });

                    const genBtn = document.createElement('button');
                    genBtn.textContent = 'Generate Temp Password';
                    genBtn.className = 'small';
                    genBtn.addEventListener('click', async() => {
                        if (!confirm('Generate temporary password for ' + (u.email || u.name) + '?')) return;
                        try {
                            const res = await fetch(API_BASE + '/admin/users/' + u._id + '/generate-temp-password', {
                                method: 'POST',
                                headers: getAdminHeader(),
                                body: JSON.stringify({})
                            });
                            const json = await res.json();
                            if (!res.ok) {
                                alert('Failed: ' + (json && json.error ? JSON.stringify(json.error) : res.status));
                                return;
                            }
                            const pwd = json.tempPassword;
                            const box = document.createElement('div');
                            box.className = 'temp-password-box';
                            box.innerHTML = '<strong>⚠ Geçici Şifre / Temporary Password:</strong><br/><code>' + pwd + '</code> ';
                            const copy = document.createElement('button');
                            copy.textContent = 'Kopyala / Copy';
                            copy.className = 'copy-btn';
                            copy.addEventListener('click', (e) => {
                                e.preventDefault();
                                navigator.clipboard && navigator.clipboard.writeText(pwd).then(() => {
                                    const orig = copy.textContent;
                                    copy.textContent = 'Kopyalandı! / Copied!';
                                    setTimeout(() => {
                                        copy.textContent = orig;
                                    }, 2000);
                                });
                            });
                            box.appendChild(copy);
                            actionsTd.appendChild(box);
                        } catch (e) {
                            alert('Error: ' + e.message);
                        }
                    });

                    actionsTd.appendChild(delBtn);
                    actionsTd.appendChild(resetBtn);
                    actionsTd.appendChild(editBtn);
                    actionsTd.appendChild(genBtn);
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);
                container.innerHTML = '';
                container.appendChild(table);
            } catch (e) {
                container.textContent = 'Error: ' + e.message;
            }
        }

        async function fetchRooms() {
            const container = document.getElementById('roomsContainer');
            container.textContent = 'Loading...';
            try {
                const res = await fetch(API_BASE + '/admin/rooms', {
                    headers: getAdminHeader()
                });
                const json = await res.json();
                if (!res.ok) {
                    container.textContent = 'Error: ' + JSON.stringify(json);
                    return;
                }
                const rooms = json.data.rooms || [];
                if (!rooms.length) {
                    container.textContent = 'No rooms';
                    return;
                }
                const table = document.createElement('table');
                const thead = document.createElement('thead');
                thead.innerHTML = '<tr><th>#</th><th>Title</th><th>Language</th><th>Created</th><th>Actions</th></tr>';
                table.appendChild(thead);
                const tbody = document.createElement('tbody');
                rooms.forEach((r, i) => {
                    const tr = document.createElement('tr');
                    const created = r.createdAt ? new Date(r.createdAt).toLocaleString() : '';
                    tr.innerHTML = `<td>${i+1}</td><td>${r.name||r.title||''}</td><td>${r.language||''}</td><td>${created}</td><td></td>`;
                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'Delete';
                    delBtn.className = 'danger';
                    delBtn.addEventListener('click', async() => {
                        if (!confirm('Delete room?')) return;
                        await fetch(API_BASE + '/admin/rooms/' + r._id, {
                            method: 'DELETE',
                            headers: getAdminHeader()
                        });
                        fetchRooms();
                    });
                    tr.querySelector('td:last-child').appendChild(delBtn);
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);
                container.innerHTML = '';
                container.appendChild(table);
            } catch (e) {
                container.textContent = 'Error: ' + e.message;
            }
        }

        refreshBtn.addEventListener('click', () => {
            fetchUsers();
            fetchRooms();
        });
        clearBtn.addEventListener('click', () => {
            adminKeyInput.value = '';
            fetchUsers();
            fetchRooms();
        });

        // initial
        fetchUsers();
        fetchRooms();
    </script>
</body>

</html>
