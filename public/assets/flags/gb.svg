<svg xmlns="http://www.w3.org/2000/svg" width="40" height="24" viewBox="0 0 40 24">
  <rect width="40" height="24" fill="#012169"/>
  <!-- White diagonals -->
  <g fill="#fff">
    <polygon points="0,0 6,0 40,18 40,24 34,24 0,6" />
    <polygon points="40,0 40,6 6,24 0,24 0,18 34,0" />
  </g>
  <!-- Red diagonals -->
  <g fill="#C8102E">
    <polygon points="0,0 3,0 40,17 40,20 37,20 0,3" />
    <polygon points="40,0 40,3 3,24 0,24 0,21 37,0" />
  </g>
  <!-- Central cross -->
  <rect x="16" y="0" width="8" height="24" fill="#fff" />
  <rect x="0" y="8" width="40" height="8" fill="#fff" />
  <rect x="17.5" y="0" width="5" height="24" fill="#C8102E" />
  <rect x="0" y="9.5" width="40" height="5" fill="#C8102E" />
</svg>